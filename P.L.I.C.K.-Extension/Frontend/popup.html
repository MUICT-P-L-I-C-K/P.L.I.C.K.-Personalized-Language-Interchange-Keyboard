<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>P.L.I.C.K. Setting</title>
  <!-- สไตล์ทั้งหมดอยู่ในไฟล์แยก -->
  <link rel="stylesheet" href="popup-page.css">
</head>

<body>
  <!-- ========== Language Toggle (มุมขวาบน) ========== -->
  <div class="lang-switch">
    <span>Eng</span>
    <label class="switch">
      <input type="checkbox" id="langToggle">
      <span class="slider"></span>
    </label>
    <span>ไทย</span>
  </div>

  <!-- ========== Title ========== -->
  <h2 id="title">P.L.I.C.K. Setting</h2>

  <!-- ========== Manual Language Switching (ปุ่มลัด) ========== -->
  <div class="setting">
    <div class="shortcut-container">
      <label>
        <input type="checkbox" id="shortcutToggle">
        <span id="labelShortcut">Manual Language Switching</span>
        <span class="tooltip">?
          <span class="tooltiptext" id="tipShortcut">Enable and set a custom keyboard shortcut to quickly toggle the
            extension.</span>
        </span>
      </label>
      <div class="shortcut-row">
        <label for="shortcutKey" id="labelSetKey">Set Key</label>
        <input type="text" id="shortcutKey" placeholder="Ctrl+Plus" readonly />
        <span class="tooltip">?
          <span class="tooltiptext" id="tipSetKey">Click inside the box and press your preferred shortcut keys.</span>
        </span>
      </div>
    </div>
  </div>

  <!-- ========== Automatic Language Switching ========== -->
  <div class="setting">
    <label>
      <input type="checkbox" id="autoDetectToggle">
      <span id="labelAutoDetect">Automatic Language Switching</span>
      <span class="tooltip">?
        <span class="tooltiptext" id="tipAutoDetect">Automatically detect typing mistakes while you write.</span>
      </span>
    </label>
  </div>

  <!-- ========== Spell Checking ========== -->
  <div class="setting">
    <label>
      <input type="checkbox" id="correctionToggle">
      <span id="labelCorrection">Spell Checking</span>
      <span class="tooltip">?
        <span class="tooltiptext" id="tipCorrection">Show suggested corrections for detected mistakes.</span>
      </span>
    </label>
  </div>

  <!-- ========== Sound Alert + Volume ========== -->
  <div class="setting">
    <div style="width: 100%;">
      <label>
        <input type="checkbox" id="soundToggle">
        <span id="labelSound">Sound Alert</span>
        <span class="tooltip">?
          <span class="tooltiptext" id="tipSound">Play a sound notification when a mistake is detected or
            corrected.</span>
        </span>
      </label>
      <!-- Volume slider -->
      <div class="volume-row">
        <span class="volume-label">Vol:</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" style="flex: 1;">
        <span id="volumeValue" class="volume-value">50</span>
      </div>
    </div>
  </div>

  <!-- ========== Buttons (Confirm / Default) ========== -->
  <div class="button-row">
    <button id="savebutton">Confirm</button>
    <button id="defaultbutton">Default Setting</button>
  </div>

  <!-- ========== Result text (for feedback messages) ========== -->
  <p id="result"></p>

  <script src="popup.js"></script>
</body>

</html>
